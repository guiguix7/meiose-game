<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meiose Quest</title>
    <link rel="stylesheet" href="CSS/style.css" />
</head>

<body>
    <main class="landing-page">
        <div class="card setup-card">
            <h1 class="page-title">Quiz de Meiose</h1>
            <p class="page-subtitle">Escolha quantos jogadores vao jogar. - <a href="intrucions.html">Como Jogar?</a></p>

            <div class="select-players">
                <label for="1player">
                    <input type="checkbox" name="1player" id="1player"/>
                    Jogar sozinho
                </label>
                <label for="2players">
                    <input type="checkbox" name="2players" id="2players"/>
                    2 Jogadores
                </label>
                <label for="3players">
                    <input type="checkbox" name="3players" id="3players"/>
                    3 Jogadores
                </label>
                <label for="4players">
                    <input type="checkbox" name="4players" id="4players"/>
                    4 Jogadores
                </label>
                <label for="5players">
                    <input type="checkbox" name="5players" id="5players"/>
                    5 Jogadores
                </label>
                <label for="6players">
                    <input type="checkbox" name="6players" id="6players"/>
                    6 Jogadores
                </label>
            </div>
            
            <button id="start-btn" type="button">Iniciar Jogo</button>

        </div>
    </main>
    <footer>
        <p>Guilherme Pereira - Victor Hugo - Davi Gato - Pedro AIlton - Caio Regio - Enzo Miguel - 2ºDS</p>
    </footer>

    <script src="JS/script.js" defer></script>
</body>

</html>
